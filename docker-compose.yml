# Local development: separate API + UI services over a shared data volume.
services:
  api:
    build: .
    command: uvicorn pitchiq.app.api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    env_file:
      - path: .env
        required: false

  ui:
    build: .
    command: >
      streamlit run pitchiq/app/ui.py --server.port 8501 --server.address 0.0.0.0
      --server.headless true --browser.gatherUsageStats false
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    env_file:
      - path: .env
        required: false
    depends_on:
      - api
