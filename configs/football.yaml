# Config for real broadcast footage with locally trained models.
# Usage: point the pipeline at this config once you have run the training
# scripts (docs/training.md). Every entry falls back gracefully if the
# weights are missing.

detection:
  backend: yolo
  weights: weights/football_yolo11n.pt   # scripts/train_detector.py output
  # public model repo (open Roboflow training data — NOT NDA); auto-fetched
  weights_url: https://huggingface.co/NuclearPanda/pitchiq-football-yolo11n/resolve/main/football_yolo11n.pt
  conf_threshold: 0.3
  imgsz: 1280
  ball:
    # TrackNet heatmap ball tracker (scripts/train_ball_tracker.py); falls
    # back to the YOLO+Kalman selector when the weights are absent
    tracknet_weights: weights/ball_tracknet_real.pt
    postprocess: true   # outlier rejection + Savitzky-Golay smoothing

calibration:
  method: auto
  keypoint_weights: weights/pitch_keypoints.pt      # scripts/train_pitch_keypoints.py

teams:
  method: embed          # learned crop embeddings — separates near-identical kits
  embed_backend: auto    # siglip (best, needs transformers) -> cnn -> colour fallback

jersey:
  enabled: true
  backend: easyocr

pose:
  enabled: true          # body-shape descriptors -> style embeddings
  model: yolo11n-pose.pt # auto-downloads; degrades gracefully if unavailable
  sample_every: 10

pitch_control:
  impute_offscreen: true  # broadcast hides ~half the players; carry recent
  impute_horizon_s: 4.0   # leavers as decaying ghosts (docs/limitations.md)

embeddings:
  learned:
    enabled: auto
    weights: weights/style_encoder.pt               # scripts/train_style_encoder.py
